<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor y Editor DXF | DESPUX</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { primary: '#3b82f6', secondary: '#1e293b' } }
            }
        }
    </script>
    
    <!-- Librería externa para procesar la geometría plana del DXF -->
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        #cad-canvas { cursor: crosshair; touch-action: none; }
        .layer-item input[type="checkbox"] { accent-color: #3b82f6; cursor: pointer; }
        html, body { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .toolbox-btn.active {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
        }
        .dark .toolbox-btn.active {
            background-color: #1e3a8a;
            border-color: #60a5fa;
            color: #bfdbfe;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300">
    
    <!-- Navbar -->
    <header class="bg-white dark:bg-slate-800 shadow-md py-4 px-6 flex justify-between items-center z-50 shrink-0">
        <a href="/" class="text-2xl font-extrabold tracking-widest uppercase cursor-pointer">
            DESPUX <span class="text-primary">CAD</span>
        </a>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-slate-700 rounded-full hover:bg-gray-300 dark:hover:bg-slate-600 transition">
                <svg class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg class="w-5 h-5 hidden dark:block text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
            </button>
            <a href="/" class="text-sm font-semibold hover:text-primary transition uppercase">Volver al Inicio</a>
        </div>
    </header>
    
    <main class="flex flex-1 overflow-hidden h-full">
        <!-- SIDEBAR IZQUIERDO -->
        <aside class="w-80 bg-white dark:bg-slate-800 shadow-lg border-r border-gray-200 dark:border-slate-700 flex flex-col z-10">
            <div class="p-6 border-b border-gray-200 dark:border-slate-700">
                <input type="file" id="dxf-file" accept=".dxf" class="hidden">
                <button type="button" onclick="document.getElementById('dxf-file').click()" class="w-full py-3 bg-primary hover:bg-blue-600 text-white font-bold rounded shadow transition flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    CARGAR PLANO (.DXF)
                </button>
            </div>

            <!-- CONTROLES -->
            <div class="p-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Herramientas</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button class="toolbox-btn active flex items-center justify-center p-2 rounded border border-gray-300 dark:border-slate-600 text-sm font-semibold transition" data-tool="pan">
                        ✋ Mover/Pan
                    </button>
                    <button class="toolbox-btn flex items-center justify-center p-2 rounded border border-gray-300 dark:border-slate-600 text-sm font-semibold transition" data-tool="measure">
                        📏 Acotar
                    </button>
                </div>
                <p id="tool-hint" class="text-xs text-gray-500 mt-2 italic text-center">Rueda del ratón para Zoom. Click arrastrar para moverse.</p>
                <div class="flex gap-2 mt-2">
                    <button id="btn-reset-view" class="flex-1 p-2 bg-gray-200 dark:bg-slate-700 hover:bg-gray-300 dark:hover:bg-slate-600 rounded text-xs font-bold transition">Encuadrar Todo</button>
                    <button id="btn-clear-meas" class="flex-1 p-2 bg-red-100 hover:bg-red-200 text-red-800 dark:bg-red-900/40 dark:hover:bg-red-900/60 dark:text-red-400 rounded text-xs font-bold transition">Borrar Cotas</button>
                    <button id="btn-export-pdf" class="flex-1 p-2 bg-green-100 hover:bg-green-200 text-green-800 dark:bg-green-900/30 dark:hover:bg-green-900/60 dark:text-green-400 rounded text-xs font-bold border border-green-300 dark:border-green-700 transition">📝 PDF Base</button>
                </div>
            </div>

            <!-- CAPAS -->
            <div class="flex-1 overflow-y-auto p-4 bg-white dark:bg-slate-800">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex justify-between">
                    <span>Lista de Capas</span>
                    <span id="layers-count" class="text-primary">0</span>
                </h3>
                <div id="layers-container" class="space-y-2">
                    <p class="text-sm text-gray-500 italic">Cargue un archivo DXF para visualizar las capas de AutoCAD aquí.</p>
                </div>
            </div>
        </aside>

        <!-- ÁREA DE DIBUJO -->
        <div class="flex-1 flex flex-col relative bg-[#f0f0f0] dark:bg-[#111827]" id="canvas-wrapper">
            <div id="coord-display" class="absolute bottom-4 left-4 bg-white/80 dark:bg-black/60 px-3 py-1 text-xs font-mono rounded shadow flex gap-4 backdrop-blur-sm z-20 pointer-events-none">
                <span>X: <span id="coord-x">0.00</span></span>
                <span>Y: <span id="coord-y">0.00</span></span>
            </div>
            
            <!-- El tool de acotado ahora es libre sin overlay estorboso, info se plama directo al lienzo -->
            <canvas id="cad-canvas" class="w-full h-full block"></canvas>
            
            <div id="loading-overlay" class="absolute inset-0 bg-white/90 dark:bg-slate-900/90 hidden items-center justify-center z-50 flex-col gap-4">
                <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                <p class="font-bold tracking-widest text-sm animate-pulse">PROCESANDO VECTORES...</p>
            </div>
        </div>
    </main>

    <!-- html2pdf global import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/dxf/app.js?v=2026-03-21T19:40"></script>
</body>
</html>
